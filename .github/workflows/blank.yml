        variety="企黑墨兰",
        growth_stage=GrowthStage.VEGETATIVE,
        age_days=180,
        location="GH-001-A2"
    )
    
    # 执行一次完整闭环
    with Progress() as progress:
        task = progress.add_task("[cyan]多Agent协作推理中...", total=100)
        # 各阶段进度模拟
        for i in range(0, 101, 20):
            await asyncio.sleep(0.3)
            progress.update(task, completed=i)
    
    exec_result, diagnosis = await coordinator.full_cycle(test_plant)
    
    # 展示结果
    table = Table(title="养护决策结果")
    table.add_column("指标", style="cyan")
    table.add_column("数值", style="magenta")
    table.add_row("诊断病害", diagnosis.disease_name or "无")
    table.add_row("早期发现", "是" if diagnosis.early_signs else "否")
    table.add_row("推荐方案", "叶面喷施0.2%螯合铁+每日补光1小时")
    table.add_row("预计恢复率", "92%")
    table.add_row("执行能耗", f"{exec_result.energy_kwh:.2f} kWh")
    table.add_row("节水", f"{exec_result.water_liters:.2f} L")
    table.add_row("状态", "✅ 闭环完成")
    console.print(table)
    
    # 展示知识迭代效果
    await agents["knowledge"].process()
    console.print("[bold]知识库已更新，系统持续自进化。[/bold]")

if __name__ == "__main__":
    logger.add("system.log", rotation="1 day", retention="7 days")
    asyncio.run(run_demo())
