# ==================== agents/decision.py ====================
from agents.base import BaseAgent
from services.llm_client import LLMClient
from knowledge.vectorstore import KnowledgeBase
from models.schemas import PlantState, DiagnosisResult, CarePlan
from config import settings

DECISION_PROMPT = """你是一位资深兰花栽培专家。基于以下信息，生成3套个性化养护方案。
信息：
- 植株状态：{plant_state}
- 病害诊断：{diagnosis}
- 相关知识库片段：{knowledge}
- 未来7天天气：{weather}

方案必须包含具体设备操作（如灌溉、补光、施肥等），并预估每套方案的效果改善和成本。
返回严格的JSON数组，每个元素格式：
{{
  "operations": [{{"device": "...", "params": {{...}}, "duration_min": 10}}],
  "predicted_benefit": {{"disease_recovery": 0.9}},
  "estimated_cost": {{"electricity": 0.1, "water": 0.02}}
}}
"""

class DecisionAgent(BaseAgent):
    """养护决策 Agent：结合 RAG 与长链推理生成多套方案"""
    def __init__(self, llm: LLMClient, kb: KnowledgeBase):
        super().__init__("DecisionAgent")
        self.llm = llm
        self.kb = kb

    async def __call__(self, plant: PlantState, diagnosis: DiagnosisResult,
                       weather: list[dict]) -> list[CarePlan]:
        retrieved = self.kb.retrieve(
            f"{plant.species} {plant.growth_stage} {diagnosis.disease_name or '健康养护'}"
        )
        knowledge_text = "\n".join([d["content"] for d in retrieved])

        prompt = DECISION_PROMPT.format(
            plant_state=plant.model_dump_json(),
            diagnosis=diagnosis.model_dump_json(),
            knowledge=knowledge_text,
            weather=weather
        )
        messages = [
            {"role": "system", "content": "你是一位严格的农业专家，只输出有效JSON。"},
            {"role": "user", "content": prompt}
        ]
        raw = await self.llm.chat(model=settings.llm_model, messages=messages)
        import json
        plans_data = json.loads(raw)
        return [CarePlan(plant_id=plant.plant_id, operations=p["operations"],
                         predicted_benefit=p["predicted_benefit"],
                         estimated_cost=p["estimated_cost"]) for p in plans_data]
