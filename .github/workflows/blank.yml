from models.data_structures import DiseaseDiagnosis

class DiseaseDiagnosisAgent(BaseAgent):
    """病害诊断Agent：基于多模态模型（通义千问3.6）进行早期病害识别"""
    def __init__(self):
        super().__init__("DiseaseDiagnosisAgent")
        # 模拟病害特征库（实际为15万张标注图像微调的模型）
        self.known_diseases = {
            "炭疽病": {"early_signs": ["叶尖发黄斑点", "湿度>80%", "温度25-30℃"]},
            "软腐病": {"early_signs": ["叶基部水渍状", "EC值偏高"]},
            "缺铁性黄化": {"early_signs": ["新叶失绿", "土壤pH>7.5", "EC值轻度偏高"]},
            "根腐病": {"early_signs": ["老叶发黄", "土壤湿度过高持续3天"]},
        }

    async def process(self, plant_id: str, sensor_data: SensorReading, 
                      plant_info: PlantStatus) -> DiseaseDiagnosis:
        """
        基于实时数据与植株历史进行推理（模拟23层Transformer推理）
        实际会调用多模态大模型，这里采用规则+概率模拟，准确率96.7%
        """
        self.logger.info(f"正在诊断植株 {plant_id}")
        # 模拟推理过程（实际为多模态模型前向传播）
        await asyncio.sleep(0.05)  # 模拟计算延迟
        
        # 特征提取（简化）
        ec = sensor_data.soil_ec_mS_cm
        ph = sensor_data.soil_ph
        moisture = sensor_data.soil_moisture_percent
        temp = sensor_data.temperature_celsius
        hum = sensor_data.humidity_percent
        
        # 模拟早期病害检测逻辑
        if ec > 1.5 and ph > 7.5 and "墨兰" in plant_info.species.value:
            # 缺铁性黄化早期
            disease = "缺铁性黄化"
            confidence = 0.967
            early_signs = True
            reasoning = "新叶失绿+EC偏高+pH偏碱，结合墨兰新芽期氮肥过量史，推断缺铁。"
            actions = ["叶面喷施0.2%螯合铁", "暂停氮肥施入", "适当增加光照"]
        elif moisture > 80 and temp > 25 and hum > 85:
            disease = "软腐病"
            confidence = 0.89
            early_signs = True
            reasoning = "叶基部水渍状初期，高湿环境，典型细菌性软腐。"
            actions = ["降低湿度至70%", "喷施农用链霉素", "隔离病株"]
        else:
            disease = None
            confidence = 0.99
            early_signs = False
            reasoning = "当前生理指标正常，无可见病变。"
            actions = ["常规监测"]
        
        return DiseaseDiagnosis(
            plant_id=plant_id,
            disease_name=disease,
            confidence=confidence,
            early_signs=early_signs,
            reasoning=reasoning,
            suggested_actions=actions,
            severity=2 if disease else 1
        )

# ========== 模拟知识库/RAG ==========
from typing import List, Tuple
import json
import random
import math
from pathlib import Path

class KnowledgeBase:
    """基于RAG的兰花种植知识库（模拟向量检索）"""
    def __init__(self):
        self.docs = []
        # 模拟3000篇论文+20万条记录的摘要向量（实际用FAISS）
        self._init_sample_knowledge()
    
    def _init_sample_knowledge(self):
        sample = [
            {"content": "墨兰新芽期氮肥过量易导致缺铁性黄化，pH>7.5时铁元素被固定。", "source": "论文#1032"},
            {"content": "连续阴天超过3天应减少氮肥施用量30%，并每日补光2小时。", "source": "大师经验-张工"},
            {"content": "蝴蝶兰花芽分化期需要昼夜温差8-10℃，光照时长12小时。", "source": "实践记录#45021"},
            # ... 更多
        ]
        # 将文本转换为简单的词频向量（模拟embedding）
        from sklearn.feature_extraction.text import TfidfVectorizer
        self.vectorizer = TfidfVectorizer()
        self.doc_vectors = self.vectorizer.fit_transform([d["content"] for d in sample])
        self.docs = sample

    def retrieve(self, query: str, top_k: int = 3) -> List[Tuple[str, str]]:
        """向量检索最相关的文档"""
        query_vec = self.vectorizer.transform([query])
        # 模拟余弦相似度
        from sklearn.metrics.pairwise import cosine_similarity
        sim = cosine_similarity(query_vec, self.doc_vectors).flatten()
        idx = sim.argsort()[-top_k:][::-1]
        return [(self.docs[i]["content"], self.docs[i]["source"]) for i in idx]

# ========== agents/maintenance_decision.py ==========
class MaintenanceDecisionAgent(BaseAgent):
    """养护决策Agent：结合RAG检索和长链推理生成个性化方案"""
    def __init__(self, knowledge_base: KnowledgeBase):
        super().__init__("MaintenanceDecisionAgent")
        self.kb = knowledge_base
        # 模拟DeepSeek V4微调模型（实际是微调后的LLM）
        self.model_name = LLM_MODEL_NAME

    async def process(self, plant_status: PlantStatus, 
                      diagnosis: DiseaseDiagnosis,
                      weather_forecast: List[Dict],  # 7天预报
                      recent_actions: List[Dict]) -> List[MaintenancePlan]:
        """生成3-5套备选养护方案"""
        self.logger.info(f"为 {plant_status.plant_id} 生成方案")
        await asyncio.sleep(0.1)  # 模拟LLM推理
        
        # 第一步：RAG检索相关知识
        query = f"{plant_status.species.value} {plant_status.growth_stage.value} "
        if diagnosis.disease_name:
            query += f"{diagnosis.disease_name} 治疗方案"
        else:
            query += "常规养护"
        retrieved_docs = self.kb.retrieve(query)
        
        # 第二步：结合诊断结果、天气、历史操作进行长链推理
        # 实际会调用LLM，此处模拟生成结构化方案
        plans = []
        # 模拟方案1：叶面喷施+光照调整
        plan1_actions = [
            {"device": "foliar_sprayer", "param": "chelate_iron_0.2%", "duration_min": 10},
            {"device": "led_supplement", "param": "10000lux", "duration_hours": 1, "time": "08:00-09:00"},
        ]
        # 方案2：大水冲淋+通风
        plan2_actions = [
            {"device": "drip_irrigation", "param": "flush_mode", "duration_min": 30},
            {"device": "fan", "param": "speed_3", "duration_hours": 2},
        ]
        # 方案3：仅调整施肥配方
        plan3_actions = [
            {"device": "fertilizer_injector", "param": "low_nitrogen_1:2:2", "amount_ml": 50},
        ]
        
        for i, actions in enumerate([plan1_actions, plan2_actions, plan3_actions], 1):
            plan = MaintenancePlan(
                plant_id=plant_status.plant_id,
                actions=actions,
                expected_improvement={"病害恢复": 0.8 if diagnosis.disease_name else 0.1},
                cost_estimate={"电费": 0.05, "水费": 0.02, "药剂": 0.1 if i==1 else 0},
            )
            plans.append(plan)
        
        return plans

# ========== agents/simulation.py ==========
class SimulationAgent(BaseAgent):
    """效果模拟Agent：数字孪生模型，预测7天后植株状态"""
    def __init__(self):
        super().__init__("SimulationAgent")
        # 简化的生理模型参数（实际可基于微分方程）
        self.base_growth_rate = {
            OrchidSpecies.MO_LAN: 0.15,
            OrchidSpecies.CHUN_LAN: 0.12,
            OrchidSpecies.JIAN_LAN: 0.18,
            OrchidSpecies.HU_DIE_LAN: 0.2,
        }
    
    async def process(self, plant_status: PlantStatus,
                      plan: MaintenancePlan,
                      weather_forecast: List[Dict]) -> Dict[str, Any]:
        """推演7天后的叶面积、病害进展、能耗等"""
        self.logger.info(f"模拟方案对植株 {plant_status.plant_id} 的效果")
        await asyncio.sleep(0.08)  # 模拟数值计算
        
        # 提取影响因子
        disease = "缺铁性黄化" if "chelate_iron" in str(plan.actions) else None
        base_growth = self.base_growth_rate.get(plant_status.species, 0.15)
        
        # 模拟天气影响
        avg_light = sum(day.get("light_lux", 30000) for day in weather_forecast) / len(weather_forecast)
        light_factor = min(1.2, avg_light / 30000)
        
        # 方案增益
        if disease:
            recovery_prob = 0.92 if "chelate_iron" in str(plan.actions) else 0.3
        else:
            recovery_prob = 1.0
        
        growth_rate = base_growth * light_factor * (1 + recovery_prob * 0.5)
        
        simulated_result = {
            "day_7_health_score": min(1.0, 0.7 + growth_rate * 7),
            "disease_recovery": recovery_prob,
            "energy_kwh": sum(a.get("duration_hours", 0) * 0.5 for a in plan.actions),
            "water_liters": sum(a.get("duration_min", 0) * 0.2 for a in plan.actions),
            "fertilizer_saved_kg": 0.01,
            "growth_improvement_percent": round(growth_rate * 7 * 100, 1)
        }
        return simulated_result

# ========== agents/execution.py ==========
class ExecutionAgent(BaseAgent):
    """执行控制Agent：将指令转化为设备控制信号，并采集执行反馈"""
    def __init__(self):
        super().__init__("ExecutionAgent")
        # 实际会连接PLC/边缘网关，这里模拟执行
    
    async def process(self, plan: MaintenancePlan) -> ExecutionResult:
        self.logger.info(f"执行方案：{plan.plant_id}")
        # 模拟向硬件发送指令（MQTT/Modbus）
        await asyncio.sleep(0.2)
        # 计算资源消耗
        energy = sum(a.get("duration_hours", 0) * 0.6 for a in plan.actions)
        water = sum(a.get("duration_min", 0) * 0.15 for a in plan.actions)
        fertilizer = 0.0
        for a in plan.actions:
            if "fertilizer_injector" in a.get("device", ""):
                fertilizer = a.get("amount_ml", 0) / 1000
        return ExecutionResult(
            success=True,
            message="执行完成",
            energy_kwh=round(energy, 3),
            water_liters=round(water, 3),
            fertilizer_kg=round(fertilizer, 4)
        )

