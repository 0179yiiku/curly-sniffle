# ==================== config.py ====================
from pathlib import Path
from pydantic_settings import BaseSettings, SettingsConfigDict

class Settings(BaseSettings):
    model_config = SettingsConfigDict(env_file=".env", env_file_encoding="utf-8")

    # LLM 配置
    llm_api_key: str = "sk-placeholder"
    llm_base_url: str = "https://api.openai.com/v1"
    llm_model: str = "gpt-4o"
    vision_model: str = "gpt-4o"
    embedding_model: str = "text-embedding-3-small"

    # 传感器数据库（示例 SQLite，生产可换为 TimescaleDB）
    sensor_db_path: Path = Path("data/sensor_data.sqlite")

    # 设备控制 API
    device_api_base: str = "http://192.168.1.100/api"

    # 向量存储
    vector_store_path: Path = Path("data/vector_store")

    # 反馈数据库
    feedback_db_path: Path = Path("data/feedback.db")

    # 系统参数
    max_reasoning_steps: int = 128
    simulation_days: int = 7
    sensor_interval_seconds: int = 300

settings = Settings()
