# ==================== knowledge/vectorstore.py ====================
from sentence_transformers import SentenceTransformer
import faiss
import numpy as np
from pathlib import Path
import pickle
from config import settings

class KnowledgeBase:
    """基于 FAISS + 嵌入模型的知识库，支持文档检索与增量更新"""
    def __init__(self):
        self.model = SentenceTransformer("BAAI/bge-small-zh-v1.5")   # 中文轻量模型
        self.index = None
        self.documents = []
        self.store_path = settings.vector_store_path
        self.store_path.mkdir(parents=True, exist_ok=True)
        self._load_or_build()

    def _load_or_build(self):
        index_file = self.store_path / "faiss.index"
        docs_file = self.store_path / "docs.pkl"
        if index_file.exists() and docs_file.exists():
            self.index = faiss.read_index(str(index_file))
            with open(docs_file, "rb") as f:
                self.documents = pickle.load(f)
        else:
            self._build_initial()

    def _build_initial(self):
        # 从 data/knowledge/*.txt 加载原始文档
        from knowledge.document_loader import load_documents
        self.documents = load_documents(settings.vector_store_path.parent / "knowledge")
        if not self.documents:
            self.index = faiss.IndexFlatL2(512)   # 占位
            return
        embeddings = self.model.encode([doc["content"] for doc in self.documents])
        dim = embeddings.shape[1]
        self.index = faiss.IndexFlatIP(dim)   # 内积，需归一化
        faiss.normalize_L2(embeddings)
        self.index.add(embeddings)
        self._persist()

    def _persist(self):
        faiss.write_index(self.index, str(self.store_path / "faiss.index"))
        with open(self.store_path / "docs.pkl", "wb") as f:
            pickle.dump(self.documents, f)

    def retrieve(self, query: str, top_k: int = 5) -> list[dict]:
        query_vec = self.model.encode([query])
        faiss.normalize_L2(query_vec)
        distances, indices = self.index.search(query_vec, top_k)
        results = []
        for dist, idx in zip(distances[0], indices[0]):
            if idx >= 0 and idx < len(self.documents):
                results.append({**self.documents[idx], "score": float(dist)})
        return results

    def add_documents(self, new_docs: list[dict]):
        if not new_docs:
            return
        embeddings = self.model.encode([d["content"] for d in new_docs])
        faiss.normalize_L2(embeddings)
        self.index.add(embeddings)
        self.documents.extend(new_docs)
        self._persist()
# ============================================================

# ==================== knowledge/document_loader.py ====================
from pathlib import Path
from typing import List

def load_documents(directory: Path) -> List[dict]:
    """从目录中读取 .txt 文件，每行一个文档"""
    docs = []
    if not directory.exists():
        return docs
    for file in directory.glob("*.txt"):
        with open(file, "r", encoding="utf-8") as f:
            for line in f:
                line = line.strip()
                if line:
                    docs.append({"content": line, "source": file.name})
    return docs
