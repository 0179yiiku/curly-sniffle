# ==================== agents/diagnosis.py ====================
from agents.base import BaseAgent
from services.llm_client import LLMClient
from models.schemas import SensorReading, PlantState, DiagnosisResult

SYSTEM_PROMPT = """你是一位世界级的兰花病理学家。
根据提供的传感器数据、植株基础信息和高清叶片图像，判断是否存在病害或生理性问题。
必须指出确切病害名称（若无则回复“健康”）、置信度(0-1)、是否处于早期阶段、
推理依据以及建议的干预措施清单。返回严格的JSON格式：
{
  "disease_name": "...",
  "confidence": 0.96,
  "early_stage": true,
  "evidence": "...",
  "recommendations": ["..."]
}
"""

class DiseaseDiagnosisAgent(BaseAgent):
    """病害诊断 Agent：借助多模态大模型进行高精度诊断"""
    def __init__(self, llm: LLMClient):
        super().__init__("DiagnosisAgent")
        self.llm = llm

    async def __call__(self, plant: PlantState) -> DiagnosisResult:
        sensor = plant.latest_sensor
        if not sensor:
            raise ValueError("缺少传感器数据")

        prompt = f"""植株ID：{plant.plant_id}
品种：{plant.species}，苗龄：{plant.age_days}天，生长阶段：{plant.growth_stage}
实时环境：温度{sensor.temperature_celsius}℃，湿度{sensor.humidity_percent}%，
光照{sensor.light_lux}lux，CO2 {sensor.co2_ppm}ppm，
土壤EC {sensor.soil_ec_mS_cm} mS/cm，湿度{sensor.soil_moisture_percent}%，
pH {sensor.soil_ph}"""

        if sensor.image_url:
            # 多模态诊断
            raw = await self.llm.vision(sensor.image_url, prompt)
        else:
            # 仅有传感器数据时，使用文本模型（效果会降低）
            messages = [
                {"role": "system", "content": SYSTEM_PROMPT},
                {"role": "user", "content": prompt}
            ]
            raw = await self.llm.chat(model=settings.llm_model, messages=messages)

        # 解析 JSON 结果（生产中应加强校验）
        import json
        data = json.loads(raw)
        return DiagnosisResult(
            plant_id=plant.plant_id,
            disease_name=data.get("disease_name"),
            confidence=data.get("confidence", 0.0),
            early_stage=data.get("early_stage", False),
            evidence=data.get("evidence", ""),
            recommendations=data.get("recommendations", [])
        )
