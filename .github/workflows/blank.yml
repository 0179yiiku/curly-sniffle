import httpx
from config import settings
from models.schemas import CarePlan

class DeviceController:
    """设备执行接口：通过 HTTP 控制大棚设备"""
    def __init__(self):
        self.base_url = settings.device_api_base
        self.client = httpx.AsyncClient(timeout=30)

    async def execute_plan(self, plan: CarePlan) -> dict:
        payload = {
            "plant_id": plan.plant_id,
            "operations": plan.operations,
        }
        resp = await self.client.post(f"{self.base_url}/execute", json=payload)
        resp.raise_for_status()
        return resp.json()

    async def close(self):
        await self.client.aclose()
