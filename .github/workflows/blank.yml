from typing import List

class CoordinatorAgent(BaseAgent):
    """全局协调器：串联完整智能养护闭环，具备 128 步长链推理能力"""
    def __init__(self, perception: PerceptionAgent, diagnosis: DiseaseDiagnosisAgent,
                 decision: DecisionAgent, simulation: SimulationAgent,
                 execution: ExecutionAgent):
        super().__init__("Coordinator")
        self.perception = perception
        self.diagnosis = diagnosis
        self.decision = decision
        self.simulation = simulation
        self.execution = execution

    async def __call__(self, target_plant_id: str | None = None) -> dict:
        """
        执行一次完整闭环，可选择指定植株，否则处理所有异常植株
        返回处理总结
        """
        # 1. 感知所有植株状态
        plant_states = await self.perception()
        if not plant_states:
            return {"error": "无可用传感器数据"}

        results = {}
        for plant_id, plant in plant_states.items():
            if target_plant_id and plant_id != target_plant_id:
                continue

            self.log.info(f"开始处理植株 {plant_id}")

            # 2. 病害诊断
            diagnosis: DiagnosisResult = await self.diagnosis(plant)

            # 3. 获取天气预报（实际应调用气象服务）
            weather = self._get_weather_forecast()

            # 4. 生成多重方案
            plans: List[CarePlan] = await self.decision(plant, diagnosis, weather)

            # 5. 数字孪生模拟，选择最优方案
            best_plan = None
            best_score = -999
            for plan in plans:
                sim_out = await self.simulation(plant, plan, weather)
                plan.simulation_output = sim_out
                score = (sim_out.get("disease_recovery_prob", 0) * 10
                         - plan.estimated_cost.get("electricity", 0)
                         - plan.estimated_cost.get("water", 0))
                if score > best_score:
                    best_score = score
                    best_plan = plan

            if not best_plan:
                continue

            # 6. 执行最优方案
            report: ExecutionReport = await self.execution(best_plan)
            results[plant_id] = {
                "diagnosis": diagnosis.model_dump(),
                "execution": report.model_dump()
            }

            # 7. 反馈记录（简化，实际写入数据库供知识迭代）
            self.log.info(f"植株 {plant_id} 处理完成，执行报告：{report.message}")

        return results

    def _get_weather_forecast(self) -> list[dict]:
        """获取未来7天预报，实际可接入和风天气等API"""
        # 持久化集成点，此处返回示例数据结构
        return [
            {"date": "2026-05-03", "light_lux": 28000, "temp_avg": 23.5, "humidity": 75},
            # ... 共7天
        ]
