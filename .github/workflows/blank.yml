# ==================== services/sensor_gateway.py ====================
import aiosqlite
from config import settings
from models.schemas import SensorReading
from datetime import datetime

class SensorGateway:
    """传感器数据访问层：从数据库读取最近一次读数"""
    def __init__(self, db_path: str | None = None):
        self.db_path = db_path or settings.sensor_db_path

    async def get_latest_readings(self, greenhouse_id: str) -> dict[str, SensorReading]:
        """返回 {plant_id: SensorReading} 映射"""
        async with aiosqlite.connect(self.db_path) as conn:
            conn.row_factory = aiosqlite.Row
            # 假设表结构: (plant_id, ts, temp, humid, light, co2, ec, moist, ph, image_url)
            query = """
                SELECT plant_id, ts, temp, humid, light, co2, ec, moist, ph, image_url
                FROM sensor_readings
                WHERE greenhouse_id = ?
                GROUP BY plant_id
                HAVING ts = MAX(ts)
            """
            async with conn.execute(query, (greenhouse_id,)) as cursor:
                rows = await cursor.fetchall()
                readings = {}
                for row in rows:
                    readings[row["plant_id"]] = SensorReading(
                        timestamp=datetime.fromisoformat(row["ts"]),
                        temperature_celsius=row["temp"],
                        humidity_percent=row["humid"],
                        light_lux=row["light"],
                        co2_ppm=row["co2"],
                        soil_ec_mS_cm=row["ec"],
                        soil_moisture_percent=row["moist"],
                        soil_ph=row["ph"],
                        image_url=row.get("image_url"),
                    )
                return readings
