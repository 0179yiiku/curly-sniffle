# ========== models/data_structures.py ==========
from pydantic import BaseModel, Field
from typing import Optional, List, Dict, Any
from enum import Enum
from datetime import datetime, timedelta
import uuid

class OrchidSpecies(str, Enum):
    CHUN_LAN = "春兰"
    MO_LAN = "墨兰"
    JIAN_LAN = "建兰"
    HU_DIE_LAN = "蝴蝶兰"
    # ... 其他120+品种简化

class GrowthStage(str, Enum):
    SEEDLING = "幼苗期"
    VEGETATIVE = "营养生长期"
    BUD_DIFFERENTIATION = "花芽分化期"
    FLOWERING = "开花期"
    DORMANCY = "休眠期"

class SensorReading(BaseModel):
    timestamp: datetime
    temperature_celsius: float
    humidity_percent: float
    light_lux: float
    co2_ppm: float
    soil_ec_mS_cm: float
    soil_moisture_percent: float
    soil_ph: float
    image_base64: Optional[str] = None  # 模拟4K图像

class PlantStatus(BaseModel):
    plant_id: str = Field(default_factory=lambda: str(uuid.uuid4()))
    species: OrchidSpecies
    variety: str  # 具体品种
    growth_stage: GrowthStage
    age_days: int
    location: str  # 大棚编号-区域
    last_reading: SensorReading

class DiseaseDiagnosis(BaseModel):
    plant_id: str
    disease_name: Optional[str]  # 病害名称，无则为None
    confidence: float
    early_signs: bool = False
    reasoning: str
    suggested_actions: List[str]
    severity: int  # 1-5

class MaintenancePlan(BaseModel):
    plant_id: str
    actions: List[Dict[str, Any]]  # 每项包括设备、参数、时长
    expected_improvement: Dict[str, float]
    cost_estimate: Dict[str, float]
    simulated_results: Optional[Dict[str, Any]] = None

class ExecutionResult(BaseModel):
    success: bool
    message: str
    energy_kwh: float
    water_liters: float
    fertilizer_kg: float
    timestamp: datetime = Field(default_factory=datetime.now)

# ========== agents/base.py ==========
from abc import ABC, abstractmethod
from loguru import logger
import asyncio
from typing import Any, Coroutine

class BaseAgent(ABC):
    """所有智能体的基类，封装日志、异步调度、错误处理"""
    def __init__(self, name: str):
        self.name = name
        self.logger = logger.bind(agent=name)

    @abstractmethod
    async def process(self, *args, **kwargs) -> Any:
        """核心处理逻辑，由子类实现"""
        pass

    async def safe_process(self, *args, **kwargs) -> Any:
        try:
            self.logger.info(f"开始处理任务: {kwargs.get('task_id', '')}")
            result = await self.process(*args, **kwargs)
            self.logger.info(f"任务完成")
            return result
        except Exception as e:
            self.logger.error(f"处理失败: {e}")
            raise

# ========== agents/perception.py ==========
import numpy as np
import random
from models.data_structures import SensorReading, PlantStatus

class PerceptionAgent(BaseAgent):
    """多模态感知Agent：模拟融合12类传感器数据 + 视觉图像"""
    def __init__(self, greenhouse_id: str):
        super().__init__("PerceptionAgent")
        self.greenhouse_id = greenhouse_id

    async def process(self) -> Dict[str, List[SensorReading]]:
        """
        返回：{plant_id: [最近5分钟读数]}
        """
        # 模拟大棚内16个采样点
        readings = {}
        for zone in ["A1", "A2", "B1", "B2", "C1", "C2"]:
            plant_id = f"{self.greenhouse_id}-{zone}-001"  # 简化
            base_temp = 22.0 + np.sin(datetime.now().hour / 24 * 2 * np.pi) * 3
            sensor = SensorReading(
                timestamp=datetime.now(),
                temperature_celsius=base_temp + random.gauss(0, 0.5),
                humidity_percent=65.0 + random.gauss(0, 2),
                light_lux=30000 * np.clip(np.sin(datetime.now().hour / 24 * np.pi), 0, 1) + random.gauss(0, 500),
                co2_ppm=420 + random.gauss(0, 20),
                soil_ec_mS_cm=1.2 + random.gauss(0, 0.05),
                soil_moisture_percent=55.0 + random.gauss(0, 1.5),
                soil_ph=6.2 + random.gauss(0, 0.1),
                # image_base64 模拟高分辨率图像，实际会用4K相机
            )
            readings[plant_id] = [sensor]
        return readings

