# ==================== models/schemas.py ====================
from pydantic import BaseModel, Field
from typing import Optional, List, Dict, Any
from enum import Enum
from datetime import datetime
import uuid

class OrchidSpecies(str, Enum):
    CHUN_LAN = "春兰"
    MO_LAN = "墨兰"
    JIAN_LAN = "建兰"
    HU_DIE_LAN = "蝴蝶兰"
    # ... 其他品种

class GrowthStage(str, Enum):
    SEEDLING = "幼苗期"
    VEGETATIVE = "营养生长期"
    BUD_DIFFERENTIATION = "花芽分化期"
    FLOWERING = "开花期"
    DORMANCY = "休眠期"

class SensorReading(BaseModel):
    timestamp: datetime = Field(default_factory=datetime.now)
    temperature_celsius: float
    humidity_percent: float
    light_lux: float
    co2_ppm: float
    soil_ec_mS_cm: float
    soil_moisture_percent: float
    soil_ph: float
    image_url: Optional[str] = None   # 图像存储路径/URL

class PlantState(BaseModel):
    plant_id: str = Field(default_factory=lambda: str(uuid.uuid4()))
    species: OrchidSpecies
    variety: str
    growth_stage: GrowthStage
    age_days: int
    greenhouse_zone: str
    latest_sensor: Optional[SensorReading] = None

class DiagnosisResult(BaseModel):
    plant_id: str
    disease_name: Optional[str] = None
    confidence: float
    early_stage: bool = False
    evidence: str
    recommendations: List[str]

class CarePlan(BaseModel):
    plant_id: str
    operations: List[Dict[str, Any]]          # 设备操作序列
    predicted_benefit: Dict[str, float]
    estimated_cost: Dict[str, float]
    simulation_output: Optional[Dict[str, Any]] = None

class ExecutionReport(BaseModel):
    plan_id: str = Field(default_factory=lambda: str(uuid.uuid4()))
    plant_id: str
    success: bool
    message: str
    energy_kwh: float
    water_liters: float
    fertilizer_kg: float
    executed_at: datetime = Field(default_factory=datetime.now)
