# ==================== agents/perception.py ====================
from agents.base import BaseAgent
from services.sensor_gateway import SensorGateway
from models.schemas import PlantState

class PerceptionAgent(BaseAgent):
    """多模态感知 Agent：获取传感器数据并与植株状态关联"""
    def __init__(self, greenhouse_id: str, gateway: SensorGateway):
        super().__init__(f"Perception-{greenhouse_id}")
        self.greenhouse_id = greenhouse_id
        self.gateway = gateway

    async def __call__(self) -> dict[str, PlantState]:
        """返回当前温室内所有植株的最新状态快照"""
        readings = await self.gateway.get_latest_readings(self.greenhouse_id)
        states = {}
        for plant_id, sensor in readings.items():
            # 实际应从种植管理数据库获取品种、苗龄等信息，此处简化
            state = PlantState(
                plant_id=plant_id,
                species=OrchidSpecies.MO_LAN,      # 应由数据库提供
                variety="企黑墨兰",
                growth_stage=GrowthStage.VEGETATIVE,
                age_days=180,
                greenhouse_zone=self.greenhouse_id,
                latest_sensor=sensor,
            )
            states[plant_id] = state
        return states
