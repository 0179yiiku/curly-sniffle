# ==================== agents/base.py ====================
from abc import ABC, abstractmethod
from loguru import logger
from typing import Any

class BaseAgent(ABC):
    """所有 Agent 的抽象基类，提供统一日志与生命周期管理"""
    def __init__(self, name: str):
        self.name = name
        self.log = logger.bind(agent=name)

    @abstractmethod
    async def __call__(self, *args, **kwargs) -> Any:
        """子类必须实现的核心处理逻辑"""
        ...

    async def safe_run(self, *args, **kwargs) -> Any:
        try:
            self.log.info("处理开始")
            result = await self(*args, **kwargs)
            self.log.info("处理完成")
            return result
        except Exception:
            self.log.exception("处理异常")
            raise
