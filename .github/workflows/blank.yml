# ==================== agents/knowledge_iter.py ====================
from agents.base import BaseAgent
from knowledge.vectorstore import KnowledgeBase
import httpx

class KnowledgeIterationAgent(BaseAgent):
    """知识迭代 Agent：定时爬取最新兰花研究，同步向量库"""
    def __init__(self, kb: KnowledgeBase, arxiv_api_url: str = "https://export.arxiv.org/api/query"):
        super().__init__("KnowledgeIterationAgent")
        self.kb = kb
        self.arxiv_api = arxiv_api_url

    async def __call__(self):
        self.log.info("开始抓取最新研究...")
        # 示例：从 arXiv 搜索“orchid cultivation”最新论文
        params = {
            "search_query": "all:orchid cultivation",
            "start": 0,
            "max_results": 10,
            "sortBy": "submittedDate",
            "sortOrder": "descending"
        }
        async with httpx.AsyncClient() as client:
            resp = await client.get(self.arxiv_api, params=params)
            # 简化 XML 解析，实际可用 feedparser
            # 这里只示意流程，将标题作为新文档
            if resp.status_code == 200:
                # 省略 XML 解析，直接构造假文献（生产需实现解析）
                new_docs = [
                    {"content": "Orchid disease control with microbiome agents", "source": "arXiv-2026"},
                    {"content": "Light quality effects on Phalaenopsis flowering", "source": "arXiv-2026"}
                ]
                self.kb.add_documents(new_docs)
                self.log.info(f"新增 {len(new_docs)} 篇文献，向量库已更新。")
        return True
