# ==================== agents/simulation.py ====================
from agents.base import BaseAgent
from models.schemas import PlantState, CarePlan, OrchidSpecies

class SimulationAgent(BaseAgent):
    """数字孪生模拟 Agent：基于兰花生理模型预测执行方案后的7天效果"""
    def __init__(self):
        super().__init__("SimulationAgent")
        # 简化生理参数（实际应采用更复杂的微分方程或数据驱动模型）
        self.base_growth_rate = {
            OrchidSpecies.MO_LAN: 0.015,
            OrchidSpecies.CHUN_LAN: 0.012,
            OrchidSpecies.JIAN_LAN: 0.018,
            OrchidSpecies.HU_DIE_LAN: 0.02,
        }

    async def __call__(self, plant: PlantState, plan: CarePlan,
                       weather: list[dict]) -> dict:
        growth = self.base_growth_rate.get(plant.species, 0.015)
        # 天气影响：光照因子
        avg_light = sum(d.get("light_lux", 30000) for d in weather) / len(weather)
        light_factor = min(1.3, avg_light / 30000)
        # 方案增益（根据操作类型粗略估算）
        recovery_boost = 0.0
        for op in plan.operations:
            dev = op.get("device", "")
            if "fertilizer" in dev or "spray" in dev:
                recovery_boost += 0.1
            elif "led" in dev or "light" in dev:
                light_factor += 0.05
        recovery_prob = min(1.0, 0.7 + recovery_boost * light_factor)
        return {
            "day_7_health_score": round(0.5 + growth * 7 * light_factor, 2),
            "disease_recovery_prob": round(recovery_prob, 2),
            "predicted_energy_kwh": sum(op.get("duration_min", 0) * 0.01 for op in plan.operations),
            "predicted_water_liters": sum(op.get("amount_liters", 0) for op in plan.operations),
        }
