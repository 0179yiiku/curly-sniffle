# ==================== main.py ====================
import asyncio
from config import settings
from services.llm_client import LLMClient
from services.sensor_gateway import SensorGateway
from services.device_api import DeviceController
from knowledge.vectorstore import KnowledgeBase
from agents.coordinator import CoordinatorAgent
from agents.perception import PerceptionAgent
from agents.diagnosis import DiseaseDiagnosisAgent
from agents.decision import DecisionAgent
from agents.simulation import SimulationAgent
from agents.execution import ExecutionAgent
from agents.knowledge_iter import KnowledgeIterationAgent
from rich.console import Console

async def main():
    console = Console()
    console.rule("[bold green]翁源兰花精准养护智能决策系统 v2.0[/bold green]")

    # 初始化依赖服务
    llm = LLMClient()
    sensor_gw = SensorGateway()
    device_ctrl = DeviceController()
    kb = KnowledgeBase()

    # 初始化 Agent
    perception = PerceptionAgent(greenhouse_id="GH-001", gateway=sensor_gw)
    diagnosis = DiseaseDiagnosisAgent(llm)
    decision = DecisionAgent(llm, kb)
    simulation = SimulationAgent()
    execution = ExecutionAgent(device_ctrl)
    coordinator = CoordinatorAgent(perception, diagnosis, decision, simulation, execution)

    # 同时启动知识迭代 Agent（可设为定时任务）
    knowledge_iter = KnowledgeIterationAgent(kb)

    try:
        # 执行一次完整闭环（处理所有植株，也可指定 plant_id）
        result = await coordinator()
        console.print(result)

        # 每日更新知识库
        await knowledge_iter()

    finally:
        await llm.close()
        await device_ctrl.close()

if __name__ == "__main__":
    asyncio.run(main())
