import aiosqlite

class KnowledgeIterationAgent(BaseAgent):
    """知识迭代Agent：每日爬取新论文，反馈优化模型"""
    def __init__(self, db_path: str = "knowledge_feedback.db"):
        super().__init__("KnowledgeIterationAgent")
        self.db_path = db_path
    
    async def process(self):
        """执行每日更新任务，包括爬取新文献、微调模型（模拟）"""
        self.logger.info("开始每日知识迭代...")
        # 模拟爬取最新兰花研究
        new_papers = [
            {"title": "使用微生物菌剂防治墨兰炭疽病的新方法", "year": 2026},
            {"title": "LED光质对蝴蝶兰花期调控的影响", "year": 2026},
        ]
        # 存储到本地向量库（实际会更新FAISS索引并触发模型微调）
        async with aiosqlite.connect(self.db_path) as db:
            await db.execute("CREATE TABLE IF NOT EXISTS papers (title TEXT, year INT)")
            for p in new_papers:
                await db.execute("INSERT INTO papers VALUES (?, ?)", (p["title"], p["year"]))
            await db.commit()
        # 反馈循环：根据近期执行效果微调决策模型（模拟）
        self.logger.info(f"已同步{len(new_papers)}篇新文献，决策模型微调完成。")
        return {"new_papers": len(new_papers)}

# ========== agents/coordinator.py ==========
from typing import Dict, Any, List
from models.data_structures import PlantStatus, SensorReading, DiseaseDiagnosis, MaintenancePlan, ExecutionResult

class CoordinatorAgent(BaseAgent):
    """全局协调Agent：调度所有Agent，处理长链推理和冲突解决"""
    def __init__(self, agents: Dict[str, BaseAgent]):
        super().__init__("CoordinatorAgent")
        self.perception_agent: PerceptionAgent = agents["perception"]
        self.diagnosis_agent: DiseaseDiagnosisAgent = agents["diagnosis"]
        self.decision_agent: MaintenanceDecisionAgent = agents["decision"]
        self.simulation_agent: SimulationAgent = agents["simulation"]
        self.execution_agent: ExecutionAgent = agents["execution"]
        self.knowledge_agent: KnowledgeIterationAgent = agents.get("knowledge")
        self.kb: KnowledgeBase = agents.get("kb")  # 知识库实例
    
    async def full_cycle(self, plant_status: PlantStatus) -> ExecutionResult:
        """
        完整的长链推理闭环：
        环境感知 → 病害诊断 → 方案生成 → 效果模拟 → 择优执行 → 反馈记录
        """
        self.logger.info(f"===== 启动全流程自愈养护：{plant_status.plant_id} =====")
        task_id = f"cycle-{datetime.now().strftime('%Y%m%d%H%M%S')}"
        
        # 1. 感知：获取最新传感器读数
        sensor_data_dict = await self.perception_agent.process()
        # 取对应植株的数据（简化，实际用plant_id索引）
        latest_reading = list(sensor_data_dict.values())[0][0]
        plant_status.last_reading = latest_reading
        
        # 2. 诊断：病害识别（多模态推理）
        diagnosis: DiseaseDiagnosis = await self.diagnosis_agent.process(
            plant_status.plant_id, latest_reading, plant_status
        )
        self.logger.info(f"诊断结果: {diagnosis.disease_name or '健康'}，置信度{diagnosis.confidence}")
        
        # 3. 决策：生成3-5套养护方案（结合RAG + 长链推理）
        # 获取未来7天天气预报（模拟）
        weather = [{"date": (datetime.now()+timedelta(days=i)).isoformat(), 
                    "light_lux": 25000 + random.randint(-5000,10000)} for i in range(7)]
        recent_actions = []  # 可从数据库获取
        plans: List[MaintenancePlan] = await self.decision_agent.process(
            plant_status, diagnosis, weather, recent_actions
        )
        
        # 4. 效果模拟：对每个方案进行7天数字孪生推演
        simulated_results = []
        for plan in plans:
            sim = await self.simulation_agent.process(plant_status, plan, weather)
            simulated_results.append((plan, sim))
            plan.simulated_results = sim
        
        # 5. 最优方案选择（综合考虑恢复概率、能耗、成本）
        # 简单评价函数：优先最大化健康恢复，其次最小化能耗
        best_plan, best_sim = max(simulated_results, 
                                key=lambda x: (x[1].get("disease_recovery",0), 
                                              -x[1].get("energy_kwh",0),
                                              -sum(x[0].cost_estimate.values())) )
        self.logger.info(f"选定最优方案，预计7天后恢复率{best_sim.get('disease_recovery',0):.2%}")
        
        # 6. 执行：将最优方案发送到设备
        exec_result: ExecutionResult = await self.execution_agent.process(best_plan)
        
        # 7. 反馈记录：写入数据库，供知识迭代Agent使用（简化）
        # 实际会将plant_id, diagnosis, plan, result写入时序数据库
        self.logger.info("闭环完成，结果已记录。")
        return exec_result, diagnosis

