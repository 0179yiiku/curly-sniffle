# ==================== services/llm_client.py ====================
import httpx
from tenacity import retry, stop_after_attempt, wait_exponential
from config import settings

class LLMClient:
    """统一的 LLM API 客户端（支持 OpenAI 兼容接口）"""
    def __init__(self):
        self.base_url = settings.llm_base_url
        self.api_key = settings.llm_api_key
        self.headers = {
            "Authorization": f"Bearer {self.api_key}",
            "Content-Type": "application/json",
        }
        self.client = httpx.AsyncClient(timeout=60.0)

    @retry(stop=stop_after_attempt(3), wait=wait_exponential(min=1, max=10))
    async def chat(self, model: str, messages: List[dict], **kwargs) -> str:
        payload = {
            "model": model,
            "messages": messages,
            "temperature": 0.3,
            **kwargs
        }
        resp = await self.client.post(
            f"{self.base_url}/chat/completions", json=payload, headers=self.headers
        )
        resp.raise_for_status()
        return resp.json()["choices"][0]["message"]["content"]

    async def vision(self, image_url: str, prompt: str) -> str:
        """多模态图像分析"""
        messages = [
            {
                "role": "user",
                "content": [
                    {"type": "text", "text": prompt},
                    {"type": "image_url", "image_url": {"url": image_url}}
                ]
            }
        ]
        return await self.chat(model=settings.vision_model, messages=messages)

    async def close(self):
        await self.client.aclose()
